# Enable SPI
CONFIG_SPI=y
#EXT POWER
CONFIG_ZMK_EXT_POWER=y

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_BACKLIGHT_ON_START=y
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n

CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=90

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# display
CONFIG_ZMK_DISPLAY=y

# BLE
CONFIG_ZMK_BLE=y
CONFIG_BT_BAS=n

#OLED confs
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=n

#CONFIG_NICE_OLED_WIDGET_RAW_HID=y
#CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT_LIST="BAS,MOV,SIG,EMP"
#CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT_CUSTOM_X=0
#CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT_CUSTOM_Y=86

#CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=n
#CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
#CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
#CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
